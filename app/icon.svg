<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <defs>
    <radialGradient id="g" cx="40%" cy="35%" r="65%">
      <stop offset="0%" stop-color="#8fd6e8"/>
      <stop offset="55%" stop-color="#4fd1c5"/>
      <stop offset="100%" stop-color="#1f6b66"/>
    </radialGradient>
  </defs>

  <!-- Background -->
  <rect width="32" height="32" rx="7" fill="#060b10"/>

  <!-- Outer glow ring -->
  <circle cx="16" cy="16" r="10.5" fill="none" stroke="#4fd1c5" stroke-width="0.6" opacity="0.25"/>

  <!-- Globe -->
  <circle cx="16" cy="16" r="8.5" fill="url(#g)"/>

  <!-- Globe grid lines -->
  <ellipse cx="16" cy="16" rx="8.5" ry="3.2" fill="none" stroke="#060b10" stroke-width="0.7" opacity="0.35"/>
  <line x1="16" y1="7.5" x2="16" y2="24.5" stroke="#060b10" stroke-width="0.7" opacity="0.35"/>
  <line x1="7.5" y1="16" x2="24.5" y2="16" stroke="#060b10" stroke-width="0.7" opacity="0.35"/>

  <!-- Orbital arc -->
  <ellipse cx="16" cy="16" rx="14.5" ry="5.5" fill="none" stroke="#8fd6e8" stroke-width="0.9" opacity="0.55" transform="rotate(-28 16 16)"/>

  <!-- Satellite dot -->
  <circle cx="28" cy="11.2" r="1.4" fill="#8fd6e8"/>
</svg>
